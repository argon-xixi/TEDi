MODEL:
  BACKBONE:
    TYPE: "swin"
  PRETRAINED_WEIGHTS: ""
  INFER_PRETRAINED_WEIGHTS: ""
  SWIN:
    TYPE: "small"
    EMBED_DIM: 96
    DEPTHS: [2, 2, 18, 2]
    NUM_HEADS: [3, 6, 12, 24]
    PATCH_SIZE: 4
    WINDOW_SIZE: 7
    MLP_RATIO: 4.0
    QKV_BIAS: true
    QK_SCALE: null
    DROP_RATE: 0.0
    ATTN_DROP_RATE: 0.0
    DROP_PATH_RATE: 0.3
    APE: false
    PATCH_NORM: true
    PRETRAIN_IMG_SIZE: 384
    USE_CHECKPOINT: false
    OUT_FEATURES: ["res2", "res3", "res4", "res5"]
  SEM_SEG_HEAD:
    NUM_CLASSES: 8
    CONVS_DIM: 256
    MASK_DIM: 256
    DEFORMABLE_TRANSFORMER_ENCODER_IN_FEATURES: ["res3", "res4", "res5"]
    COMMON_STRIDE: 4
    TRANSFORMER_ENC_LAYERS: 6
  MASK_FORMER:
    DEEP_SUPERVISION: true
    NO_OBJECT_WEIGHT: 0.1
    CLASS_WEIGHT: 2.0
    MASK_WEIGHT: 5.0
    DICE_WEIGHT: 5.0
    BOUNDARY_WEIGHT: 5.0
    HIDDEN_DIM: 256
    NUM_OBJECT_QUERIES: 10
    NHEADS: 8
    DROPOUT: 0.0
    DIM_FEEDFORWARD: 2048
    PRE_NORM: false
    SIZE_DIVISIBILITY: 32
    DEC_LAYERS: 10
    TRAIN_NUM_POINTS: 12544
    OVERSAMPLE_RATIO: 3.0
    IMPORTANCE_SAMPLE_RATIO: 0.75
  MEMORY_BANK:
    NUM_MEM_FRAMES: 3
    NUM_TRACK_FRAMES: 3

SOLVER:
  LR: 0.00006
  MAX_ITER: 20000
  OPTIMIZER: "ADAMW"
  CLIP_GRADIENTS:
    ENABLED: true
    CLIP_TYPE: "full_model"
    CLIP_VALUE: 0.01
    NORM_TYPE: 2.0

TRAIN:
  LOG_DIR: "outputs/logs"
  CKPT_DIR: "outputs/checkpoints"
  BATCH_SIZE: 4
